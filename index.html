<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>○○農業高校 直売所</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:#f5f8f2;
  color:#333;
}

/* ===== ヘッダー ===== */
header{
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:18px 8%;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:2rem;
  font-weight:bold;
  color:#2e7d32;
}

.sub{
  color:#666;
}

/* ===== ヒーロー ===== */
.hero{
  position:relative;
  height:500px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(55%);
}

.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  width:90%;
}

.hero-text h1{
  font-size:4rem;
  margin-bottom:15px;
}

.hero-text p{
  font-size:1.4rem;
}

/* ===== メイン ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

.section-title{
  text-align:center;
  font-size:2.5rem;
  color:#2e7d32;
}

.lead{
  text-align:center;
  color:#666;
  margin:15px 0 50px;
}

/* ===== カード ===== */
.card-grid{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
  gap:28px;
}

.card{
  background:white;
  border-radius:25px;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:.3s;
  display:block;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 18px 35px rgba(0,0,0,.15);
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.card-body{
  padding:22px;
}

.tag{
  display:inline-block;
  background:#dff5e0;
  color:#2e7d32;
  padding:6px 12px;
  border-radius:999px;
  font-size:.9rem;
  font-weight:bold;
}

.card h3{
  font-size:1.8rem;
  margin:12px 0 10px;
}

.card p{
  color:#666;
}

/* ===== フッター ===== */
footer{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:30px;
  margin-top:60px;
}

/* ===== スマホ ===== */
@media(max-width:768px){

.hero{
  height:320px;
}

.hero-text h1{
  font-size:2.3rem;
}

.hero-text p{
  font-size:1rem;
}

.logo{
  font-size:1.5rem;
}
}
</style>
</head>

<body>

<header>
  <div class="logo">🌱 ○○農業高校 直売所</div>
  <div class="sub">
    わたしたちが育てた作物を紹介します
  </div>
</header>

<section class="hero">
  <img src="images/hero.jpg"
       alt="農場風景">

  <div class="hero-text">
    <h1>畑から、まっすぐ。</h1>
    <p>○年○組のみんなで育てました</p>
  </div>
</section>

<main class="container">

<h2 class="section-title">
今日のおすすめ
</h2>

<p class="lead">
気になる作物をクリックしてください
</p>

<div class="card-grid">

<!-- トマト -->
<a class="card" href="tomato.html">

<img src="images/tomato.jpg"
alt="トマト">

<div class="card-body">
<span class="tag">完熟</span>
<h3>あま〜いトマト</h3>
<p>
朝採れ新鮮！そのまま食べても甘い。
</p>
</div>

</a>

<!-- きゅうり -->
<a class="card" href="cucumber.html">

<img src="images/cucumber.jpg"
alt="きゅうり">

<div class="card-body">
<span class="tag">新鮮</span>
<h3>シャキシャキきゅうり</h3>
<p>
みずみずしくてサラダにぴったり。
</p>
</div>

</a>

<!-- ナス -->
<a class="card" href="eggplant.html">

<img src="images/eggplant.jpg"
alt="なす">

<div class="card-body">
<span class="tag">人気</span>
<h3>とろ〜りナス</h3>
<p>
焼いても煮てもおいしい！
</p>
</div>

</a>

</div>
</main>

<footer>
© 2026 ○○農業高校
農業情報活用の授業で作りました
</footer>

</body>
</html>
